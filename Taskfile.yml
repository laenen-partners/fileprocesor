version: "3"

dotenv: [".env"]

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  generate:
    desc: Generate protobuf and connect-go code
    cmds:
      - buf generate

  lint:
    desc: Lint protobuf definitions
    cmds:
      - buf lint

  build:
    desc: Build the fproc server binary
    cmds:
      - go build -o bin/fproc ./cmd/fproc

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run all tests
    cmds:
      - go test -v -count=1 ./...

  run:
    desc: Run the server locally
    cmds:
      - go run ./cmd/fproc

  test:e2e:
    desc: Run e2e tests (requires task infra:up)
    cmds:
      - go test -v -count=1 -run 'TestE2E_' -timeout 300s ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  infra:up:
    desc: Start infrastructure via Tilt
    cmds:
      - tilt up

  infra:down:
    desc: Stop infrastructure
    cmds:
      - tilt down
      - docker compose down -v
