syntax = "proto3";
package fileprocessor.v1;
option go_package = "github.com/laenen-partners/fileprocesor/gen/fileprocessor/v1;fileprocessorv1";

service FileProcessorService {
  rpc Process(ProcessRequest) returns (ProcessResponse);
  rpc ScanFile(ScanFileRequest) returns (ScanFileResponse);
  rpc ConvertToPDF(ConvertToPDFRequest) returns (ConvertToPDFResponse);
  rpc MergePDFs(MergePDFsRequest) returns (MergePDFsResponse);
  rpc GenerateThumbnail(GenerateThumbnailRequest) returns (GenerateThumbnailResponse);
  rpc ExtractMarkdown(ExtractMarkdownRequest) returns (ExtractMarkdownResponse);
}

// --- Enums ---

enum ImageFormat {
  IMAGE_FORMAT_UNSPECIFIED = 0; // defaults to JPEG
  IMAGE_FORMAT_JPEG = 1;
  IMAGE_FORMAT_PNG = 2;
  IMAGE_FORMAT_WEBP = 3;
}

enum PageSelection {
  PAGE_SELECTION_UNSPECIFIED = 0; // defaults to FIRST
  PAGE_SELECTION_FIRST = 1;
  PAGE_SELECTION_ALL = 2;
}

// --- Shared ---

message FileRef {
  string bucket = 1;   // Bucket name (must be in server's ALLOWED_BUCKETS if configured).
  string key = 2;      // Object key (path traversal sequences are rejected).
  string content_type = 3;
}

// --- Pipeline ---

// ProcessRequest defines a multi-step file processing pipeline.
// Maximum input file size is controlled by the server (default 256 MB).
message ProcessRequest {
  repeated FileInput inputs = 1;
  repeated Operation operations = 2;
  map<string, FileRef> destinations = 3;
  reserved 4;
  reserved "max_concurrency";
}

message FileInput {
  string name = 1;          // Unique name within the pipeline, used to reference this input in operations.
  string bucket = 2;        // Bucket name (must be in server's ALLOWED_BUCKETS if configured).
  string key = 3;           // Object key (path traversal sequences are rejected).
  string content_type = 4;  // MIME type of the input file.
}

message Operation {
  string name = 1;
  repeated string inputs = 2;
  oneof op {
    ScanOp scan = 10;
    ConvertToPDFOp convert_to_pdf = 11;
    MergePDFsOp merge_pdfs = 12;
    ThumbnailOp thumbnail = 13;
    ExtractMarkdownOp extract_markdown = 14;
  }
}

message ScanOp {}
message ConvertToPDFOp {}
message MergePDFsOp {}
message ThumbnailOp {
  int32 width = 1;
  int32 dpi = 2;
  ImageFormat format = 3;
  PageSelection pages = 4;
}
message ExtractMarkdownOp {}

message ProcessResponse {
  string workflow_id = 1;
  map<string, OperationResult> results = 2;
}

message OperationResult {
  bool success = 1;
  string error = 2;
  oneof detail {
    ScanDetail scan = 10;
    MarkdownDetail markdown = 11;
    ThumbnailDetail thumbnail = 12;
  }
  FileRef destination = 20;
  int64 size_bytes = 21;
}

message ScanDetail {
  bool clean = 1;
  // Detail from the antivirus scanner: virus name when a threat is detected,
  // or error message on scanner failure. Empty when clean.
  string detail = 3;
  reserved 2;
  reserved "virus_name";
}
message MarkdownDetail { string markdown = 1; string html = 2; }

message ThumbnailPage {
  int32 page_number = 1;
  FileRef file = 2;
  int64 size_bytes = 3;
}

message ThumbnailDetail {
  repeated ThumbnailPage pages = 1;
}

// --- Standalone RPCs ---
// Maximum file size per request is controlled by the server (default 256 MB,
// configurable via MAX_FILE_SIZE_BYTES). Backend response bodies are capped at
// 512 MB (Gotenberg, Docling) or 256 MB (pdf2img).

message ScanFileRequest { string bucket = 1; string key = 2; }
message ScanFileResponse { bool clean = 1; string detail = 2; }

// ConvertToPDFRequest converts a document to PDF.
// content_type should match the actual file type for correct backend routing.
message ConvertToPDFRequest {
  string bucket = 1; string key = 2; string content_type = 3;
  FileRef destination = 4;
}
message ConvertToPDFResponse { FileRef result = 1; int64 size_bytes = 2; }

message MergePDFsRequest {
  repeated FileRef files = 1;
  FileRef destination = 2;
}
message MergePDFsResponse { FileRef result = 1; int64 size_bytes = 2; }

message GenerateThumbnailRequest {
  string bucket = 1; string key = 2;
  FileRef destination = 3;
  int32 width = 4; int32 dpi = 5;
  ImageFormat format = 6;
  PageSelection pages = 7;
}
message GenerateThumbnailResponse {
  // Deprecated: use results instead. Populated with first page for backwards compatibility.
  FileRef result = 1 [deprecated = true];
  int64 size_bytes = 2;
  // Per-page results. Always populated (single element for PAGE_SELECTION_FIRST).
  repeated ThumbnailPage results = 3;
}

message ExtractMarkdownRequest {
  string bucket = 1; string key = 2;
  FileRef docling_json_destination = 3;
}
message ExtractMarkdownResponse {
  string markdown = 1; string html = 2;
  FileRef docling_json = 3;
}
