name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fileprocessor
          POSTGRES_PASSWORD: fileprocessor
          POSTGRES_DB: fileprocessor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fileprocessor"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Download dependencies
        run: go mod download

      - name: Buf lint
        run: buf lint

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        env:
          DBOS_DATABASE_URL: postgres://fileprocessor:fileprocessor@localhost:5432/fileprocessor?sslmode=disable
        run: go test -coverprofile=coverage.out -count=1 ./...
